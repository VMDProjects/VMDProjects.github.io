name: Auto Content Pipeline
on:
  schedule:
    - cron: '0 6 * * *' # Runs daily at 06:00 UTC automatically
  workflow_dispatch:
jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Content Generator
        run: |
          python3 generate_content.py
      
      - name: Commit & Push to GitHub Pages
        run: |
          git config user.name "VMDProjectsBot"
          git config user.email "bot@vmdprojects.dev"
          git add content/
          if git diff --cached --quiet; then
            echo "No new articles generated. Skipping commit."
          else
            git commit -m "Auto-publish: $(date +%Y-%m-%d) daily batch"
            git push origin main
          fi
