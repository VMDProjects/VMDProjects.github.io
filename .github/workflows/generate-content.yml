name: Generate and Publish Content

on:
  schedule:
    # Runs every day at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 markdown2

      - name: Create config directory
        run: mkdir -p config

      - name: Create config file
        run: |
          cat > config/affiliates.json << 'EOF'
          {
            "nowpayments": {
              "referral_link": "https://account.nowpayments.io/create-account?link_id=2996241443",
              "merchant_id": "NOW_PAYMENTS_MERCHANT_ID",
              "description": "Crypto payment gateway accepting 150+ coins"
            },
            "adsterra": {
              "pop_unders": "<script src=\"https://pl29901420.effectivecpmnetwork.com/96/46/60/96466007a40f0c546818a7b528b43400.js\"><\/script>",
              "direct_link": "https://www.effectivecpmnetwork.com/h0niswc1?key=59036b18a53b13a875c7706d579f9e92",
              "network": "Effective CPM Network"
            }
          }
          EOF

      - name: Generate content
        run: python generate_content.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sitemap
        run: python sitemap_generator.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: Commit changes
        run: |
          git add -A
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generated content and sitemap - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: logs/
          retention-days: 7
